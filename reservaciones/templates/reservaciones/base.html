<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Salas</title>
</head>
<body>
    <nav>
        <a href="{% url 'inicio' %}" id="link-inicio">Inicio / Mis Reservas</a>
        {% if user.is_authenticated %}
            <span id="user-info">Hola, {{ user.username }}</span>
        {% else %}
            <a href="{% url 'login' %}" id="link-login">Iniciar Sesión</a>
        {% endif %}
    </nav>

    <div id="contenedor-mensajes">
        {% if messages %}
            <ul class="mensajes">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>

    <main>
        {% block content %}
        {% endblock content %}
    </main>
</body>
</html>
